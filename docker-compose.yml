services:
  db:
    image: postgres:16-alpine
    container_name: smart-vault-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-smartvault}
      POSTGRES_USER: ${DB_USER:-vaultadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vaultpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-vault-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vaultadmin}:${DB_PASSWORD:-vaultpassword}@db:5432/${DB_NAME:-smartvault}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000
      S3_ENDPOINT_URL: http://localstack:4566
      S3_PUBLIC_URL_OVERRIDE: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      # Auth: internal Keycloak URL for JWKS fetching (container-to-container)
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smart-vault
      KEYCLOAK_CLIENT_ID: smart-vault-app
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    ports:
      - "8000:8000"
    volumes:
      # Persist migrations on the host so they aren't lost when containers are recreated
      - "./backend/alembic/versions:/app/alembic/versions"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-vault-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-use-openssl-rand}
      KEYCLOAK_CLIENT_ID: smart-vault-app
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-secret-change-in-prod}
      # Browser-accessible Keycloak URL for the OIDC redirect flow
      KEYCLOAK_ISSUER: http://localhost:8080/realms/smart-vault
    depends_on:
      - backend
      - keycloak
    networks:
      - frontend-net
    ports:
      - "3000:3000"

  localstack:
    image: localstack/localstack:3.0.0
    container_name: smart-vault-storage
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - DEBUG=1
    volumes:
      - "./infrastructure/localstack_init:/etc/localstack/init/ready.d"
    networks:
      - backend-net
      - frontend-net

  # --- Identity Provider ---
  # Keycloak: auto-imports the smart-vault realm on startup (zero config for devs)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: smart-vault-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-secret-change-in-prod}
    volumes:
      - "./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - backend-net
      - frontend-net

  # --- Observability Stack ---
  # Prometheus: scrapes /metrics from the backend every 15s
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: smart-vault-prometheus
    restart: always
    volumes:
      - "./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
    ports:
      - "9090:9090"
    networks:
      - backend-net
      - frontend-net

  # Grafana: pre-provisioned with Prometheus datasource and API health dashboard
  grafana:
    image: grafana/grafana:10.4.3
    container_name: smart-vault-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - "./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro"
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - frontend-net

volumes:
  postgres_data:
  grafana_data:

networks:
  backend-net:
  frontend-net:
